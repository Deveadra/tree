name: CI Release Gates

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  gate_safety_invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip pytest
      - name: Run safety invariants gate
        run: |
          pytest -q \
            tests/test_prune_plan_integrity.py \
            tests/test_prune_flows_integration.py \
            tests/test_space_audit_integration_and_safety.py \
            tests/test_policy_firewall.py \
            tests/test_prompt_security.py \
            tests/test_protection_policy_engine.py
      - name: Upload safety invariant artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-safety-invariants-${{ github.run_id }}
          retention-days: 30
          path: |
            .pytest_cache/**

  gate_schema_compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip pytest
      - name: Run schema compatibility gate
        run: |
          pytest -q \
            tests/test_schema_compatibility_golden.py \
            tests/test_golden_plan_output.py \
            tests/test_golden_recommendations.py
      - name: Upload schema compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-schema-compatibility-${{ github.run_id }}
          retention-days: 30
          path: |
            .pytest_cache/**

  gate_soak_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip pytest
      - name: Run soak test gate
        run: |
          pytest -q \
            tests/test_watchdog_soak_and_recovery.py \
            tests/test_free_space_watchdog.py
      - name: Upload soak test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-soak-tests-${{ github.run_id }}
          retention-days: 30
          path: |
            .pytest_cache/**

  gate_e2e_flows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip pytest
      - name: Run E2E flow gate
        run: |
          pytest -q \
            tests/test_cli_e2e_smoke.py \
            tests/test_service_api_smoke.py
      - name: Upload E2E flow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-e2e-flows-${{ github.run_id }}
          retention-days: 30
          path: |
            .pytest_cache/**


  gate_ui_layout_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install UI test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 xvfb
          pip install -U pip pytest -r requirements.txt
      - name: Run Qt UI layout smoke gate
        run: xvfb-run -a pytest -q tests/test_ui_layout_smoke.py
      - name: Upload UI snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-ui-layout-smoke-${{ github.run_id }}
          retention-days: 30
          path: |
            tests/fixtures/ui_snapshots/**
            .pytest_cache/**

  gate_f_dependency_and_static_security_scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip pip-audit bandit
      - name: Dependency vulnerability scan
        run: pip-audit
      - name: Static security scan
        run: bandit -q -r core config cli.py dupe_core.py dupe_finder_gui.py

  release_blocker:
    name: External release blocker
    runs-on: ubuntu-latest
    needs:
      - gate_c_policy_firewall_and_prompt_security
      - gate_d_explainability_and_ranking_repro
      - gate_e_privacy_and_export_hygiene
      - gate_f_dependency_and_static_security_scans
      - gate_safety_invariants
      - gate_schema_compatibility
      - gate_soak_tests
      - gate_e2e_flows
      - gate_ui_layout_smoke
    steps:
      - name: Enforce gate and flaky policy
        run: |
          echo "All required gates passed and no skipped jobs allowed for external release tier."
          echo "Flaky threshold for external release is 0 retries/known flakes."
